services:
  postgres:
    image: postgres:16-alpine
    container_name: mediturnos-db
    environment:
      POSTGRES_DB: mediturnos
      POSTGRES_USER: mediturnos
      POSTGRES_PASSWORD: mediturnos123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediturnos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mediturnos-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mediturnos
      SPRING_DATASOURCE_USERNAME: mediturnos
      SPRING_DATASOURCE_PASSWORD: mediturnos123
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mediturnos-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:

